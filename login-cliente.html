<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Entrar – Cliente | GÁS JÁ!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="css/imagens/icon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <img src="css/imagens/logo gas já laranja.svg" alt="Gás já" class="logo-img">
</header>

<section class="login">
    <div class="login-box">
        <h2>Entrar como cliente</h2>

        <form>
            <input type="email" placeholder="E-mail" required>
            <input type="password" placeholder="Senha" required>

            <button type="submit" class="btn btn-primary">
                Entrar
            </button>
        </form>

        <p class="login-link">
            Ainda não tem conta?
            <a href="#">Criar conta</a>
        </p>
    </div>
</section>

</body>
</html>
